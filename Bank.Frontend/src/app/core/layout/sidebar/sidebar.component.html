<div
    class="flex flex-col h-full bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transition-colors duration-500 relative shadow-2xl z-20">

    <!-- Logo Section -->
    <div class="flex items-center space-x-3 py-8 border-b border-slate-100 dark:border-slate-800/50 transition-all duration-300"
        [class.px-6]="!isCollapsed" [class.justify-center]="isCollapsed" [class.px-0]="isCollapsed">
        <div class="w-10 h-10 flex-shrink-0 flex items-center justify-center transition-transform duration-300"
            [class.scale-110]="isCollapsed">
            <img src="logo.png" alt="FinBank Logo" class="w-full h-full object-contain">
        </div>
        <span *ngIf="!isCollapsed" @fadeInOut
            class="text-xl font-bold tracking-tight text-slate-900 dark:text-white transition-colors duration-500 truncate">
            FinBank
        </span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-6 space-y-1 overflow-y-auto custom-scrollbar transition-all duration-300"
        [class.px-3]="!isCollapsed" [class.px-1.5]="isCollapsed">
        <a *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive #rla="routerLinkActive"
            [class.active-link]="rla.isActive"
            class="flex items-center py-3.5 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all duration-200 group relative"
            [class.px-4]="!isCollapsed" [class.justify-center]="isCollapsed" [class.px-0]="isCollapsed">

            <mat-icon [class.text-indigo-600]="rla.isActive" class="flex-shrink-0 transition-colors duration-200">{{
                item.icon }}</mat-icon>

            <span *ngIf="!isCollapsed" @fadeInOut class="ml-4 text-sm font-semibold truncate">
                {{ item.label }}
            </span>

            <!-- Tooltip for collapsed state -->
            <div *ngIf="isCollapsed"
                class="absolute left-full ml-4 px-3 py-1.5 bg-slate-900 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity whitespace-nowrap z-50">
                {{ item.label }}
            </div>

            <!-- Active Indicator -->
            <div *ngIf="rla.isActive" class="absolute right-0 w-1 h-6 bg-indigo-500 rounded-l-full"></div>
        </a>
    </nav>

    <div class="px-3 pb-6 transition-all duration-300" [class.px-1.5]="isCollapsed">
        <mat-divider class="mb-6 !border-slate-100 dark:!border-slate-800/50"></mat-divider>

        <!-- Logout -->
        <button (click)="logout()"
            class="w-full flex items-center py-3.5 rounded-2xl text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-all duration-200 group relative"
            [class.px-4]="!isCollapsed" [class.justify-center]="isCollapsed" [class.px-0]="isCollapsed">
            <mat-icon class="flex-shrink-0">logout</mat-icon>
            <span *ngIf="!isCollapsed" @fadeInOut class="ml-4 text-sm font-bold truncate">Logout</span>

            <div *ngIf="isCollapsed"
                class="absolute left-full ml-4 px-3 py-1.5 bg-rose-500 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity whitespace-nowrap z-50">
                Logout
            </div>
        </button>
    </div>
</div>
