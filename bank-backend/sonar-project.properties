# SonarQube Configuration for Banking Backend
sonar.projectKey=banking-backend
sonar.projectName=Banking Backend
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=.
sonar.exclusions=**/bin/**,**/obj/**,**/wwwroot/**,**/*.Tests/**,**/Migrations/**

# Test configuration
sonar.tests=.
sonar.test.inclusions=**/*.Tests/**/*.cs
sonar.test.exclusions=**/bin/**,**/obj/**

# Coverage configuration
sonar.cs.dotcover.reportsPaths=coverage.xml
sonar.cs.opencover.reportsPaths=coverage.opencover.xml

# Language configuration
sonar.language=cs

# Quality gate configuration
sonar.qualitygate.wait=true

# Additional settings
sonar.sourceEncoding=UTF-8