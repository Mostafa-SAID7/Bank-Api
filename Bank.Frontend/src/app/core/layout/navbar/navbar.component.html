<mat-toolbar
    class="!bg-white dark:!bg-slate-900 !border-b !border-slate-200 dark:!border-slate-800 !px-6 flex items-center h-16 transition-colors duration-500">

    <!-- Search Bar with Suggestions -->
    <div class="search-container relative flex-1 max-w-md group">
        <div class="relative flex items-center w-full">
            <mat-icon
                class="absolute left-4 z-10 text-slate-400 group-focus-within:text-indigo-500 transition-colors">search</mat-icon>
            <input type="text" (focus)="showSearchSuggestions.set(true)" placeholder="Search resources, users..."
                class="w-full pl-11 pr-4 py-2 bg-slate-100 dark:bg-slate-800 border-none rounded-xl text-sm focus:ring-2 focus:ring-indigo-500/20 text-slate-900 dark:text-white transition-all outline-none">
        </div>

        <!-- Suggestions Dropdown -->
        <div *ngIf="showSearchSuggestions()" [@dropdownAnimation]
            class="absolute top-full left-0 w-full mt-2 bg-white/90 dark:bg-slate-900/95 backdrop-blur-xl border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl overflow-hidden z-50">
            <div class="p-2 border-b border-slate-100 dark:border-slate-800">
                <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400 px-3 py-1">Recent Suggestions
                </p>
                <div *ngFor="let s of suggestions"
                    class="flex items-center p-3 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-xl cursor-pointer group transition-colors">
                    <div
                        class="w-10 h-10 rounded-lg bg-indigo-50 dark:bg-indigo-500/10 flex items-center justify-center mr-3">
                        <mat-icon class="text-indigo-500 text-sm">{{s.icon}}</mat-icon>
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-slate-700 dark:text-slate-200 leading-tight">{{s.title}}
                        </p>
                        <p class="text-xs text-slate-400 leading-tight mt-0.5">{{s.type}} • {{s.detail}}</p>
                    </div>
                </div>
            </div>
            <div class="p-3 bg-slate-50 dark:bg-slate-800/20 text-center">
                <button class="text-xs font-bold text-indigo-600 dark:text-indigo-400 hover:underline">View all
                    results</button>
            </div>
        </div>
    </div>

    <span class="flex-1"></span>

    <div class="flex items-center space-x-2">
        <!-- Sidebar Toggle -->
        <button mat-icon-button (click)="layoutService.toggleSidebar()"
            class="!text-slate-400 hover:!text-indigo-500 transition-colors">
            <mat-icon>{{ layoutService.isSidebarCollapsed() ? 'menu_open' : 'menu' }}</mat-icon>
        </button>

        <!-- Theme Toggle -->
        <button mat-icon-button (click)="toggleTheme()"
            class="!text-slate-400 hover:!text-indigo-500 transition-colors">
            <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <!-- Notifications with Dropdown -->
        <div class="notifications-container relative">
            <button mat-icon-button (click)="showNotifications.set(!showNotifications())"
                class="!text-slate-400 hover:!text-indigo-500 transition-colors relative">
                <mat-icon>notifications</mat-icon>
                <span matBadge="3" matBadgeColor="warn" matBadgeSize="small"></span>
            </button>

            <!-- Notifications Dropdown -->
            <div *ngIf="showNotifications()" [@dropdownAnimation]
                class="absolute top-full right-0 w-[320px] mt-2 bg-white/90 dark:bg-slate-900/95 backdrop-blur-xl border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl overflow-hidden z-50">
                <div class="p-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                    <h3 class="font-bold text-slate-900 dark:text-white">Notifications</h3>
                    <span
                        class="text-[10px] bg-indigo-100 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 px-2 py-0.5 rounded-full font-bold">3
                        NEW</span>
                </div>
                <div class="max-h-[300px] overflow-y-auto">
                    <div *ngFor="let n of notifications"
                        class="p-4 border-b border-slate-50 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/50 cursor-pointer transition-colors flex items-start space-x-3">
                        <mat-icon
                            [class]="'text-sm ' + (n.type === 'warning' ? 'text-amber-500' : n.type === 'success' ? 'text-emerald-500' : 'text-blue-500')">{{n.icon}}</mat-icon>
                        <div class="flex-1">
                            <p class="text-sm font-medium text-slate-700 dark:text-slate-300 leading-snug">{{n.title}}
                            </p>
                            <p class="text-xs text-slate-400 mt-1">{{n.time}}</p>
                        </div>
                    </div>
                </div>
                <button
                    class="w-full p-3 text-xs font-bold text-indigo-600 dark:text-indigo-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                    View all notifications
                </button>
            </div>
        </div>

        <!-- User Profile Dropdown -->
        <div class="profile-container relative ml-2">
            <button (click)="showProfileMenu.set(!showProfileMenu())"
                class="flex items-center space-x-3 pl-1 pr-1.5 py-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                <div
                    class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold border-2 border-slate-200 dark:border-slate-800">
                    AD
                </div>
                <mat-icon class="!text-slate-400 !m-0 !w-4 !h-4" style="font-size: 16px;">expand_more</mat-icon>
            </button>

            <!-- Profile Menu Dropdown -->
            <div *ngIf="showProfileMenu()" [@dropdownAnimation]
                class="absolute top-full right-0 w-[240px] mt-2 bg-white/90 dark:bg-slate-900/95 backdrop-blur-xl border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl overflow-hidden z-50">
                <div class="p-4 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-100 dark:border-slate-800">
                    <p class="text-sm font-bold text-slate-900 dark:text-white leading-none">Admin User</p>
                    <p class="text-xs text-slate-400 mt-1 leading-none">admin&#64;finbank.com</p>
                </div>
                <div class="p-2">
                    <button routerLink="/profile" (click)="showProfileMenu.set(false)"
                        class="w-full flex items-center space-x-3 px-3 py-2 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all text-sm text-left">
                        <mat-icon style="font-size: 18px; width: 18px; height: 18px;">person_outline</mat-icon>
                        <span>Account Profile</span>
                    </button>
                    <button routerLink="/settings" (click)="showProfileMenu.set(false)"
                        class="w-full flex items-center space-x-3 px-3 py-2 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all text-sm text-left">
                        <mat-icon style="font-size: 18px; width: 18px; height: 18px;">settings</mat-icon>
                        <span>Settings</span>
                    </button>
                    <div class="my-2 border-t border-slate-100 dark:border-slate-800"></div>
                    <button (click)="logout()"
                        class="w-full flex items-center space-x-3 px-3 py-2 rounded-xl text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-all text-sm font-semibold">
                        <mat-icon style="font-size: 18px; width: 18px; height: 18px;">logout</mat-icon>
                        <span>Sign Out</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</mat-toolbar>
