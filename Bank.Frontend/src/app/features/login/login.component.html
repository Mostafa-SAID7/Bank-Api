<div
    class="min-h-screen bg-slate-50 dark:bg-slate-950 flex items-center justify-center p-4 transition-colors duration-500 relative">
    <!-- Theme Toggle -->
    <div class="absolute top-8 right-8 z-50">
        <button (click)="themeService.toggleTheme()"
            class="p-4 rounded-2xl bg-white/10 dark:bg-slate-800/50 backdrop-blur-xl border border-white/20 dark:border-slate-700/50 text-slate-800 dark:text-white shadow-xl hover:scale-110 active:scale-95 transition-all duration-300">
            <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
    </div>

    <!-- Ambient glows -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-indigo-200/50 dark:bg-indigo-500/20 rounded-full blur-3xl">
        </div>
        <div
            class="absolute -bottom-40 -left-40 w-96 h-96 bg-violet-200/50 dark:bg-violet-500/20 rounded-full blur-3xl">
        </div>
    </div>

    <div class="relative w-full max-w-md z-10">
        <!-- Brand -->
        <div class="text-center mb-10 w-full">
            <div
                class="inline-flex items-center justify-center w-28 h-28 mb-8 animate-fade-in transition-transform hover:scale-110">
                <img src="logo.png" alt="FinBank Logo" class="w-full h-full object-contain">
            </div>
            <h1
                class="text-4xl font-extrabold tracking-tight text-slate-900 dark:text-white transition-colors duration-500">
                FinBank</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-3 font-semibold text-lg">Payment Operations Platform</p>
        </div>

        <!-- Card -->
        <mat-card
            class="!bg-white dark:!bg-slate-900/60 !backdrop-blur-2xl !border-0 !rounded-[2.5rem] !shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:!shadow-[0_20px_50px_rgba(0,0,0,0.3)] overflow-hidden transition-all duration-500">

            <mat-card-header class="!px-10 !pt-12 !pb-4">
                <mat-card-title class="!text-3xl !font-extrabold text-slate-900 dark:text-white !tracking-tight">Sign
                    In</mat-card-title>
                <mat-card-subtitle class="text-slate-500 dark:text-slate-400 !text-sm !mt-2">Welcome back! Please enter
                    your details.</mat-card-subtitle>
            </mat-card-header>

            <mat-card-content class="!px-10 !pb-12 !pt-6">
                <!-- Error Alert -->
                <div *ngIf="error"
                    class="mb-8 flex items-start space-x-3 bg-rose-50 dark:bg-rose-500/10 border border-rose-100 dark:border-rose-500/20 text-rose-600 dark:text-rose-400 rounded-2xl px-5 py-4 text-sm animate-in fade-in slide-in-from-top-2 duration-300">
                    <mat-icon class="!text-xl mt-0.5">error_outline</mat-icon>
                    <span class="font-semibold leading-relaxed">{{ error }}</span>
                </div>

                <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-7">
                    <!-- Email -->
                    <div>
                        <label for="email"
                            class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2.5 ml-1">Email
                            Address</label>
                        <mat-form-field appearance="outline"
                            class="group w-full !rounded overflow-hidden !bg-slate-50 dark:!bg-slate-800/40 border border-transparent focus-within:!border-indigo-500/50 focus-within:ring-4 focus-within:ring-indigo-500/10 transition-all duration-300">
                            <input matInput type="email" [(ngModel)]="email" name="email" id="email" required
                                placeholder="admin@finbank.com"
                                class="!font-medium placeholder:text-slate-400 dark:placeholder:text-slate-600 ">
                            <mat-icon matPrefix
                                class="text-slate-400 dark:text-slate-500 mr-2 transition-colors duration-300 group-focus-within:!text-indigo-500">alternate_email</mat-icon>
                        </mat-form-field>
                    </div>

                    <!-- Password -->
                    <div>
                        <div class="flex items-center justify-between mb-2.5 px-1">
                            <label for="password"
                                class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
                            <a href="#"
                                class="text-xs font-bold text-indigo-600 dark:text-indigo-400 hover:text-indigo-500 transition-colors">Forgot?</a>
                        </div>
                        <mat-form-field appearance="outline"
                            class="group w-full !rounded overflow-hidden !bg-slate-50 dark:!bg-slate-800/40 border border-transparent focus-within:!border-indigo-500/50 focus-within:ring-4 focus-within:ring-indigo-500/10 transition-all duration-300">
                            <input matInput [type]="hidePassword ? 'password' : 'text'" [(ngModel)]="password"
                                name="password" id="password" required placeholder="••••••••"
                                class="!font-medium placeholder:text-slate-400 dark:placeholder:text-slate-600 ">
                            <mat-icon matPrefix
                                class="text-slate-400 dark:text-slate-500 mr-2 transition-colors duration-300 group-focus-within:!text-indigo-500">lock_person</mat-icon>
                            <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword"
                                class="!text-slate-400 dark:!text-slate-500 active:scale-90 transition-transform">
                                <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                            </button>
                        </mat-form-field>
                    </div>

                    <!-- Options -->
                    <div class="flex items-center space-x-3 px-1">
                        <input id="remember" type="checkbox"
                            class="w-5 h-5 rounded border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-indigo-600 focus:ring-indigo-500 transition-all cursor-pointer">
                        <label for="remember"
                            class="text-sm font-medium text-slate-600 dark:text-slate-400 cursor-pointer select-none">Stay
                            signed in</label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" [disabled]="loading || !loginForm.form.valid"
                        class="w-full py-4 !rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-bold text-lg shadow-xl shadow-indigo-500/25 hover:shadow-indigo-500/40 active:scale-[0.98] transition-all duration-300 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                        <mat-spinner *ngIf="loading" diameter="24" class="inline-block mr-3"
                            color="accent"></mat-spinner>
                        {{ loading ? 'Signing in...' : 'Sign In' }}
                    </button>

                    <!-- Support/Footer -->
                    <div class="mt-8 pt-6 border-t border-slate-200/60 dark:border-slate-800 text-center">
                        <p class="text-slate-500 dark:text-slate-400 text-sm">
                            Don't have an account?
                            <a routerLink="/register"
                                class="text-indigo-600 dark:text-indigo-400 font-bold hover:underline ml-1">Create
                                One</a>
                        </p>
                    </div>
                    <p class="text-center text-slate-500 dark:text-slate-400 text-sm font-medium pt-2">
                        Need help?
                        <a href="#"
                            class="text-indigo-600 dark:text-indigo-400 font-bold hover:underline decoration-2 underline-offset-4">Contact
                            Support</a>
                    </p>
                </form>
            </mat-card-content>
        </mat-card>
    </div>
</div>
