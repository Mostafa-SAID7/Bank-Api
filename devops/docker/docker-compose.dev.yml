version: '3.8'

services:
  # Development Database
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bank-database-dev
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=DevPassword123!
      - MSSQL_PID=Express
    ports:
      - "1434:1433"
    volumes:
      - bank_dev_data:/var/opt/mssql
    networks:
      - bank-dev-network
    restart: unless-stopped

  # Development Redis
  redis:
    image: redis:7-alpine
    container_name: bank-redis-dev
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - bank-dev-network
    restart: unless-stopped

volumes:
  bank_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  bank-dev-network:
    driver: bridge